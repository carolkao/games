<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小遊戲</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f7f3e8;
    color: #263238;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  main { width: min(720px, 100%); }
  h1 { margin: 0 0 18px; font-size: clamp(2rem, 8vw, 4rem); }
  .games { display: grid; gap: 12px; }
  a {
    display: block;
    padding: 18px 20px;
    border: 3px solid #263238;
    border-radius: 8px;
    background: white;
    color: inherit;
    text-decoration: none;
    font-size: 1.35rem;
    font-weight: 800;
    box-shadow: 5px 5px 0 #263238;
  }
  a:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 #263238; }
  span { display: block; margin-top: 4px; font-size: .95rem; font-weight: 500; opacity: .7; }
</style>
</head>
<body>
<main>
  <h1>小遊戲</h1>
  <div class="games">
    <a href="./forest-cabin/">森林小屋<span>採集、蓋屋、經營森林小鎮</span></a>
    <a href="./multiplication-tetris/">九九乘法消消樂<span>用乘法題玩方塊消除</span></a>
  </div>
</main>
</body>
</html>
