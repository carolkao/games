  if(x>VW+150||x+w<-150||y>VH+150||y+h<-150)return;
  const cx=x+w/2, cy=y+h/2;

  if(level===0){
    // Build site with progress bars for all 5 resources
    const pulse=0.55+Math.sin(Date.now()/400)*0.45;
    ctx.fillStyle='rgba(20,15,35,0.88)';roundRect(x,y,w,h,14);ctx.fill();
    ctx.strokeStyle=`rgba(200,180,255,${pulse})`;ctx.lineWidth=2.5;ctx.setLineDash([6,4]);

    ctx.font='7px sans-serif';ctx.fillStyle='#ccc';
    ctx.fillText('🪵80 🪨80 🪙500 🌸20 🍄10',cx,cy+18);

    // 5 deposit bars
    const bars=[
      {dep:TOWNHALL.woodDep,   tot:TOWNHALL_COST.wood,    color:'#CD853F', label:`🪵${TOWNHALL.woodDep}/${TOWNHALL_COST.wood}`},
      {dep:TOWNHALL.stoneDep,  tot:TOWNHALL_COST.stone,   color:'#aaa',    label:`🪨${TOWNHALL.stoneDep}/${TOWNHALL_COST.stone}`},
      {dep:TOWNHALL.goldDep,   tot:TOWNHALL_COST.gold,    color:'#FFD700', label:`🪙${TOWNHALL.goldDep}/${TOWNHALL_COST.gold}`},
      {dep:TOWNHALL.flowersDep,tot:TOWNHALL_COST.flowers, color:'#FF69B4', label:`🌸${TOWNHALL.flowersDep}/${TOWNHALL_COST.flowers}`},

    ];

      ctx.font='bold 9px sans-serif';ctx.fillStyle='#00FF88';ctx.textAlign='center';

      ctx.fillStyle='#00FF88';roundRect(cx-40,startY+5*12+14,80*prog,7,3);ctx.fill();
    }
    return;
  }

  // Built town hall — grand building
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(cx,y+h+4,w*0.7,8,0,0,Math.PI*2);ctx.fill();
  // Main body
  ctx.fillStyle='#E8E0C8';roundRect(x+8,y+h*0.25,w-16,h*0.75+2,4);ctx.fill();
  ctx.strokeStyle='#B0A090';ctx.lineWidth=2;roundRect(x+8,y+h*0.25,w-16,h*0.75+2,4);ctx.stroke();

// ── FW Shop ──
function drawFWShop(){
  if(gamePhase<2)return;
  const{x:sx,y:sy,w:sw,h:sh,buyTimer:bt}=FW_SHOP;
  const x=wx(sx),y=wy(sy);
  if(x<-120||x>VW+120||y<-120||y>VH+120)return;
  const maxed=flowerWorkers.length>=FW_SHOP.MAX;
  const canBuy=!maxed&&P.gold>=FW_COST;
  const cy=y+sh/2;

  // Panel
  ctx.fillStyle=maxed?'rgba(50,35,15,0.88)':(canBuy?'rgba(80,20,50,0.88)':'rgba(50,35,15,0.88)');
  roundRect(x,y,sw,sh,10);ctx.fill();
  ctx.strokeStyle=maxed?'rgba(120,80,40,0.7)':(canBuy?'#FF69B4':'rgba(120,80,40,0.7)');
  ctx.lineWidth=2;roundRect(x,y,sw,sh,10);ctx.stroke();

  // Divider line on left edge
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y+12);ctx.lineTo(x,y+sh-12);ctx.stroke();

  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='30px serif';ctx.fillText('👩‍🌾',x+sw/2,cy-28);
  ctx.font='bold 12px sans-serif';ctx.fillStyle='#fff';
  ctx.shadowColor='#000';ctx.shadowBlur=3;
  ctx.fillText('採花工人',x+sw/2,cy-5);
  ctx.shadowBlur=0;

  if(maxed){
    ctx.fillStyle='#FFD700';ctx.font='bold 11px sans-serif';ctx.fillText('全滿',x+sw/2,cy+12);
  }else{
    ctx.fillStyle=canBuy?'#FFD700':'#888';ctx.font='10px sans-serif';
    ctx.fillText(`${FW_COST} 🪙`,x+sw/2,cy+12);
  }

  // Worker dot counter
  const dotR=6, dotGap=dotR*2+5, dotStartX=x+sw/2-(FW_SHOP.MAX-1)*dotGap/2;
  for(let i=0;i<FW_SHOP.MAX;i++){
    ctx.beginPath();ctx.arc(dotStartX+i*dotGap,cy+30,dotR,0,Math.PI*2);
    ctx.fillStyle=i<flowerWorkers.length?'#FF69B4':'rgba(255,255,255,0.15)';ctx.fill();
    ctx.strokeStyle=i<flowerWorkers.length?'#FFB6C1':'rgba(255,255,255,0.3)';
    ctx.lineWidth=1.5;ctx.stroke();
    if(i<flowerWorkers.length){ctx.font='8px serif';ctx.fillStyle='#fff';ctx.fillText('🌸',dotStartX+i*dotGap,cy+30);}
  }

  // Buy progress bar
  if(bt>0){
    const prog=bt/BUY_TIME;
    ctx.fillStyle='rgba(255,105,180,0.2)';roundRect(x+6,y+sh-10,sw-12,6,3);ctx.fill();
    ctx.fillStyle='#FF69B4';roundRect(x+6,y+sh-10,(sw-12)*prog,6,3);ctx.fill();
  }else if(canBuy){
    const pulse=(Math.sin(Date.now()/500)+1)/2*0.3;
    ctx.fillStyle=`rgba(255,105,180,${0.08+pulse})`;
    roundRect(x+2,y+2,sw-4,sh-4,9);ctx.fill();
  }
}

// ── Particles ──
function drawParticles(){
  for(const p of parts){
    const x=wx(p.x),y=wy(p.y);
    if(x<-60||x>VW+60)continue;
    ctx.globalAlpha=Math.max(0,p.life/p.max);

// ── Minimap ──
function drawMinimap(){
  const MW=100,MH=75,MX=VW-MW-8,MY=8,PAD=2;
  ctx.fillStyle='rgba(0,0,0,0.55)';roundRect(MX-PAD,MY-PAD,MW+PAD*2,MH+PAD*2,5);ctx.fill();
  const sx=v=>MX+(v/WW)*MW,sy=v=>MY+(v/WH)*MH;
  // With bird owned, show all resource positions clearly
  const showAll=birdOwned();
  ctx.fillStyle='#2ecc71';for(const t of trees)if(!t.dead){ctx.beginPath();ctx.arc(sx(t.x),sy(t.y),showAll?3:2,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#bdc3c7';for(const r of rocks)if(!r.dead){ctx.beginPath();ctx.arc(sx(r.x),sy(r.y),showAll?3:2,0,Math.PI*2);ctx.fill();}
  if(gamePhase>=4){ctx.fillStyle='#FF8800';for(const m of mushrooms)if(m.ready){ctx.beginPath();ctx.arc(sx(m.x),sy(m.y),2,0,Math.PI*2);ctx.fill();}}
  ctx.fillStyle='#f39c12';ctx.fillRect(sx(MARKET.x)-3,sy(MARKET.y)-3,6,6);
  if(gamePhase>=1){
    ctx.fillStyle=HSTATE.level>0?'#e67e22':'#FFD700';
    ctx.fillRect(sx(HOUSE_X)-4,sy(HOUSE_Y)-4,8,8);
  }
  if(gamePhase>=2)for(const p of flowerPatches){
    ctx.fillStyle=p.state==='ready'?'#FF69B4':'#90EE90';
    ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#3498db';for(const w of workers){ctx.beginPath();ctx.arc(sx(w.x),sy(w.y),2.5,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#FF69B4';for(const fw of flowerWorkers){ctx.beginPath();ctx.arc(sx(fw.x),sy(fw.y),2.5,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(sx(P.x),sy(P.y),3.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
  ctx.strokeRect(sx(cam.x),sy(cam.y),(VW/WW)*MW,(VH/WH)*MH);
}

  ctx.font='10px sans-serif';ctx.fillStyle='#666';ctx.fillText('速度 ‧ 背包 ‧ 工人',VW-12,cy+8);

    ctx.font='bold 10px sans-serif';ctx.fillStyle='#FFD700';ctx.textAlign='right';
    ctx.fillText(phaseLabel,VW-12,cy+22);
  }
  // Owned pets row (small icons) — fixed at Y+54 to stay within HUD_H=72
  const ownedPets=petShops.filter(p=>p.owned);
  if(ownedPets.length>0){
    const petRowY=Y+56; // centre of pet icon row

    ctx.fillText('寵物',VW-12,Y+46);
    ownedPets.forEach((pet,i)=>{
      const px=px0+i*24+12;
      ctx.fillStyle=PET_DISC_COLORS[petShops.indexOf(pet)]||'rgba(180,140,60,0.3)';
      ctx.beginPath();ctx.arc(px,petRowY,10,0,Math.PI*2);ctx.fill();
      ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(pet.emoji,px,petRowY);
      const ps2=petShops.find(p2=>p2.id===pet.id);

        const dotColor=ps2.state==='sleep'?'#6699bb':ps2.state==='rest'?'#aabb88':ps2.state==='cuddle'?'#ff66aa':'#66dd88';
        ctx.fillStyle=dotColor;ctx.beginPath();ctx.arc(px+7,petRowY-7,3,0,Math.PI*2);ctx.fill();
      }

    ctx.textAlign='right';
  }

  // Hint
  if(gamePhase===0&&UPG.speed+UPG.bag+UPG.workers===0&&P.gold<40){
    ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,255,150,0.6)';ctx.textAlign='center';
    ctx.fillText('💡 砍樹採礦→走到🏪賣出→到右上角買升級',VW/2,Y+HUD_H-8);
  }
  if(gamePhase===1){
    ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,220,80,0.8)';ctx.textAlign='center';
    const canBuild=P.wood>=BUILD_COST.wood&&P.stone>=BUILD_COST.stone;
    ctx.fillText(canBuild?'💡 帶著木頭石頭走向📐建造小屋！':'💡 先累積 🪵×15 + 🪨×10，再去📐建造',VW/2,Y+HUD_H-8);
  }
}

// ─── SAVE / LOAD ──────────────────────────────
const SAVE_KEY='forest-cottage-save-v1';
function collectSave(){
  return{
    v:1, gamePhase,
    Px:P.x,Py:P.y,wood:P.wood,stone:P.stone,flowers:P.flowers,gold:P.gold,
    upgSpeed:UPG.speed,upgBag:UPG.bag,upgWorkers:UPG.workers,
    workersCount:workers.length,
    houseLevel:HSTATE.level,
    seeds:P_seeds,mushroomsHeld:P_mushrooms,
    fstandLevel:FSTAND.level,fstandInv:FSTAND.inventory,
    flowerWorkersCount:flowerWorkers.length,
    patches:flowerPatches.map(p=>({s:p.state,g:p.growTimer})),
    pets:petShops.map(p=>p.owned),
    mushroomForest:mushrooms.map(m=>({r:m.ready,t:m.timer})),
    warehouseLevel:WAREHOUSE.level,
    townhallLevel:TOWNHALL.level,
    totalPlayTime,totalGoldEarned,
  };
}
function saveGame(){
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify(collectSave())); }catch(e){}
}
function loadGame(){
  let d;
  try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw)return false; d=JSON.parse(raw); }catch(e){ return false; }
  gamePhase=d.gamePhase||0;
  UPG.speed=d.upgSpeed||0;UPG.bag=d.upgBag||0;UPG.workers=d.upgWorkers||0;
  P.x=d.Px??P.x;P.y=d.Py??P.y;P.wood=d.wood||0;P.stone=d.stone||0;P.flowers=d.flowers||0;P.gold=d.gold||0;
  for(let i=0;i<(d.workersCount||0);i++) workers.push(new WorkerAI(WW-300+i*55,200+i*60));
  HSTATE.level=d.houseLevel||0;
  P_seeds=d.seeds||0;P_mushrooms=d.mushroomsHeld||0;
  FSTAND.level=d.fstandLevel||0;FSTAND.inventory=d.fstandInv||0;
  for(let i=0;i<(d.flowerWorkersCount||0);i++) flowerWorkers.push(new FlowerWorkerAI(GDN.x+GDN_W+SHOP_GAP+SHOP_W/2, GDN.y+GDN_H/2+30));
  if(gamePhase>=2){
    initFlowerPatches();
    (d.patches||[]).forEach((sp,i)=>{ if(flowerPatches[i]){flowerPatches[i].state=sp.s;flowerPatches[i].growTimer=sp.g;} });
  }
  (d.pets||[]).forEach((owned,i)=>{ if(petShops[i])petShops[i].owned=!!owned; });
  if(gamePhase>=4){
    initMushroomForest();
    (d.mushroomForest||[]).forEach((sm,i)=>{ if(mushrooms[i]){mushrooms[i].ready=sm.r;mushrooms[i].timer=sm.t;} });
  }
  WAREHOUSE.level=d.warehouseLevel||0;
  TOWNHALL.level=d.townhallLevel||0;
  totalPlayTime=d.totalPlayTime||0;totalGoldEarned=d.totalGoldEarned||0;
  cam.x=clamp(P.x-VW/2,0,WW-VW);cam.y=clamp(P.y-VH/2,0,WH-VH);
  return true;
}

  [petShops[0],petShops[1]].forEach((ps,i)=>{
    ps.px=500+i*45;ps.py=250;ps.bobPhase=i;
    ps.wanderTx=ps.px;ps.wanderTy=ps.py;ps.wanderTimer=3;ps.jumpVel=0;ps.jumpZ=0;ps.state='wander';
  });
  P.gold=800; P_seeds=5; P_mushrooms=8;
  initFlowerPatches();flowerPatches[0].state='ready';
  flowerWorkers.push(new FlowerWorkerAI(GDN.x+GDN_W+SHOP_GAP+SHOP_W/2, GDN.y+GDN_H/2+30));
  initMushroomForest();
  P.x=TOWNHALL.x+TOWNHALL.w/2; P.y=TOWNHALL.y-90;
  cam.x=clamp(P.x-VW/2,0,WW-VW); cam.y=clamp(P.y-VH/2,0,WH-VH);
}
requestAnimationFrame(loop);
</script>
