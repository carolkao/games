<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小遊戲樂園</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, #fff3d6 0%, #e3f6ff 45%, #ffe1ef 100%);
    color: #33324a;
    font-family: -apple-system, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
  }
  h1 {
    font-size: 2rem;
    color: #ff6b9d;
    text-shadow: 0 2px 0 #fff;
    margin: 0 0 8px;
  }
  p.subtitle { opacity: .7; margin: 0 0 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
    gap: 20px;
    width: 100%;
    max-width: 900px;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    background: #fff8ea;
    border-radius: 20px;
    padding: 28px 20px;
    box-shadow: 0 8px 24px rgba(80,50,140,.15);
    border: 4px solid #ffd166;
    transition: transform .15s;
  }
  .card:hover { transform: translateY(-4px); }
  .card .icon { font-size: 3rem; }
  .card h2 { margin: 0; font-size: 1.2rem; }
  .card p { margin: 0; font-size: .85rem; opacity: .7; text-align: center; }
  @media (max-width: 520px) {
    body { padding: 24px 10px; }
    h1 { font-size: 1.6rem; }
    p.subtitle { margin-bottom: 18px; }
    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .card {
      gap: 6px;
      padding: 14px 8px;
      border-width: 3px;
      border-radius: 12px;
    }
    .card .icon { font-size: 2.1rem; }
    .card h2 { font-size: .95rem; text-align: center; }
    .card p { display: none; }
  }
</style>
</head>
<body>
  <h1>🎮 小遊戲樂園</h1>
  <p class="subtitle">挑一個遊戲開始玩吧！</p>
  <div class="grid" id="grid"></div>

<script>
  // Add a new game here — one entry, one card. Point `path` at that game's folder.
  const GAMES = [
    {
      icon: "🍎",
      title: "九九乘法消消樂",
      description: "邊練九九乘法邊消方塊",
      path: "games/multiplication-tetris/",
    },
    {
      icon: "🌲",
      title: "森林小屋",
      description: "採集資源、經營小屋",
      path: "games/forest-cabin/",
    },
  ];

  const grid = document.getElementById("grid");
  GAMES.forEach(game => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = game.path;
    a.innerHTML = `
      <div class="icon">${game.icon}</div>
      <h2>${game.title}</h2>
      <p>${game.description}</p>
    `;
    grid.appendChild(a);
  });
</script>
</body>
</html>
